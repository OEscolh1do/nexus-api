# =============================================================
# Neonorte Workspace — Docker Compose (Operação Guardiões)
# 4 Contentores: API Gateway, Iaçã, Kurupira, MySQL
# =============================================================

services:

  # ==========================================================
  # API GATEWAY — Ponto único de entrada público
  # ==========================================================
  api-gateway:
    image: nginx:alpine
    container_name: neonorte_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      iaca-backend:
        condition: service_healthy
      kurupira-backend:
        condition: service_healthy
    networks:
      - neonorte_net

  # ==========================================================
  # IAÇÃ — O Cérebro de Gestão (I/O-Bound)
  # CRM, Finanças, Ops, Strategy, IAM
  # ==========================================================
  iaca-backend:
    build:
      context: ./iaca-erp/backend
      dockerfile: Dockerfile
    container_name: neonorte_iaca
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://user_iaca:iaca_S3cur3_2026!@nexus-db:3306/db_iaca"
      JWT_SECRET: "nexus_dev_secret_2026"
      M2M_SERVICE_TOKEN: "m2m_guardioes_secret_2026!"
      PORT: 3001
      NODE_ENV: development
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - neonorte_net

  # ==========================================================
  # KURUPIRA — O Músculo de Engenharia (CPU/Memory-Bound)
  # Simulação solar, GIS, PDFs, dimensionamento elétrico
  # ==========================================================
  kurupira-backend:
    build:
      context: ./kurupira/backend
      dockerfile: Dockerfile
    container_name: neonorte_kurupira
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://user_kurupira:kuru_S3cur3_2026!@nexus-db:3306/db_kurupira"
      JWT_SECRET: "nexus_dev_secret_2026"
      M2M_SERVICE_TOKEN: "m2m_guardioes_secret_2026!"
      IACA_INTERNAL_URL: "http://iaca-backend:3001"
      PORT: 3002
      NODE_ENV: development
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - neonorte_net

  # ==========================================================
  # NEONORTE ADMIN — Backoffice do Operador (BFF)
  # Gestão, Auditoria, Catálogos, Supervisão
  # ==========================================================
  neonorte-admin-backend:
    build:
      context: ./neonorte-admin/backend
      dockerfile: Dockerfile
    container_name: neonorte_admin
    restart: unless-stopped
    environment:
      DATABASE_URL_IACA_RO: "mysql://user_admin:admin_S3cur3_2026!@nexus-db:3306/db_iaca"
      DATABASE_URL_KURUPIRA_RO: "mysql://user_admin:admin_S3cur3_2026!@nexus-db:3306/db_kurupira"
      JWT_SECRET: "nexus_dev_secret_2026"
      M2M_SERVICE_TOKEN: "m2m_guardioes_secret_2026!"
      IACA_INTERNAL_URL: "http://iaca-backend:3001"
      KURUPIRA_INTERNAL_URL: "http://kurupira-backend:3002"
      ADMIN_FRONTEND_URL: "http://localhost:5175"
      PORT: 3003
      NODE_ENV: development
    depends_on:
      nexus-db:
        condition: service_healthy
      iaca-backend:
        condition: service_healthy
      kurupira-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - neonorte_net

  # ==========================================================
  # NEXUS-DB — Fortaleza de Dados (MySQL 8.0)
  # Schemas lógicos: db_iaca + db_kurupira
  # ==========================================================
  nexus-db:
    image: mysql:8.0
    container_name: neonorte_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: neonorte_root_2026!
    ports:
      - "3306:3306"
    volumes:
      - nexus_mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pneonorte_root_2026!"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - neonorte_net

# ==========================================================
# REDE PRIVADA — Nenhuma porta interna exposta ao host
# ==========================================================
networks:
  neonorte_net:
    driver: bridge

volumes:
  nexus_mysql_data:
