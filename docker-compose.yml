# =============================================================
# Neonorte Workspace — Docker Compose (Operação Guardiões)
# 4 Contentores: API Gateway, Iaçã, Kurupira, MySQL
# Otimizado para VPS 2GB (Logto Hybrid Cloud)
# =============================================================

services:

  # ==========================================================
  # API GATEWAY — Ponto único de entrada público
  # ==========================================================
  api-gateway:
    image: nginx:alpine
    container_name: neonorte_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      iaca-backend:
        condition: service_healthy
      kurupira-backend:
        condition: service_healthy
      neonorte-admin-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - neonorte_net

  # ==========================================================
  # IAÇÃ — O Cérebro de Gestão (I/O-Bound)
  # ==========================================================
  iaca-backend:
    build:
      context: ./iaca/backend
      dockerfile: Dockerfile
    container_name: neonorte_iaca
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://user_iaca:iaca_S3cur3_2026!@nexus-db:3306/db_iaca"
      JWT_SECRET: "nexus_dev_secret_2026"
      M2M_SERVICE_TOKEN: "m2m_guardioes_secret_2026!"
      PORT: 3001
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      LOGTO_ENDPOINT: "https://214fzz.logto.app"
      LOGTO_JWKS_URI: "https://214fzz.logto.app/oidc/jwks"
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - neonorte_net

  # ==========================================================
  # KURUPIRA — O Músculo de Engenharia (CPU/Memory-Bound)
  # ==========================================================
  kurupira-backend:
    build:
      context: ./kurupira/backend
      dockerfile: Dockerfile
    container_name: neonorte_kurupira
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://user_kurupira:kuru_S3cur3_2026!@nexus-db:3306/db_kurupira"
      JWT_SECRET: "nexus_dev_secret_2026"
      M2M_SERVICE_TOKEN: "m2m_guardioes_secret_2026!"
      IACA_INTERNAL_URL: "http://iaca-backend:3001"
      PORT: 3002
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=400"
      LOGTO_ENDPOINT: "https://214fzz.logto.app"
      LOGTO_JWKS_URI: "https://214fzz.logto.app/oidc/jwks"
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - neonorte_net

  # ==========================================================
  # NEONORTE ADMIN — Backoffice do Operador (BFF Sumaúma)
  # ==========================================================
  neonorte-admin-backend:
    build:
      context: ./sumauma/backend
      dockerfile: Dockerfile
    container_name: neonorte_admin
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://user_sumauma:sumauma_S3cur3_2026!@nexus-db:3306/db_sumauma"
      DATABASE_URL_IACA_RO: "mysql://user_admin:admin_S3cur3_2026!@nexus-db:3306/db_iaca"
      DATABASE_URL_KURUPIRA_RO: "mysql://user_admin:admin_S3cur3_2026!@nexus-db:3306/db_kurupira"
      JWT_SECRET: "nexus_dev_secret_2026"
      M2M_SERVICE_TOKEN: "m2m_guardioes_secret_2026!"
      IACA_INTERNAL_URL: "http://iaca-backend:3001"
      KURUPIRA_INTERNAL_URL: "http://kurupira-backend:3002"
      ADMIN_FRONTEND_URL: "https://admin.seu-dominio.com"
      LOGTO_ENDPOINT: "https://214fzz.logto.app"
      LOGTO_JWKS_URI: "https://214fzz.logto.app/oidc/jwks"
      LOGTO_M2M_CLIENT_ID: "78gi2h4gwsbnncyc10769"
      LOGTO_M2M_CLIENT_SECRET: "6nKfrtSNMOqBwbUt2aOMMkVPZ8dKHusC"
      PORT: 3003
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
    depends_on:
      nexus-db:
        condition: service_healthy
      iaca-backend:
        condition: service_healthy
      kurupira-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - neonorte_net

  # ==========================================================
  # NEXUS-DB — Fortaleza de Dados (MySQL 8.0)
  # ==========================================================
  nexus-db:
    image: mysql:8.0
    container_name: neonorte_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: neonorte_root_2026!
    ports:
      - "3306:3306"
    volumes:
      - nexus_mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pneonorte_root_2026!"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neonorte_net

# ==========================================================
# REDE PRIVADA
# ==========================================================
networks:
  neonorte_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  nexus_mysql_data:
