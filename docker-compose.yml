# =============================================================
# Neonorte Workspace — Docker Compose (Operação Guardiões)
# 4 Contentores: API Gateway, Iaçã, Kurupira, MySQL
# Segredos lidos do arquivo .env na raiz do projeto.
# Otimizado para VPS 2GB (Logto Hybrid Cloud)
# =============================================================

services:

  # ==========================================================
  # API GATEWAY — Ponto único de entrada público
  # ==========================================================
  api-gateway:
    image: nginx:alpine
    container_name: neonorte_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      iaca-backend:
        condition: service_healthy
      kurupira-backend:
        condition: service_healthy
      neonorte-admin-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - neonorte_net

  # ==========================================================
  # IAÇÃ — O Cérebro de Gestão (I/O-Bound)
  # ==========================================================
  iaca-backend:
    build:
      context: ./iaca/backend
      dockerfile: Dockerfile
    container_name: neonorte_iaca
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://${DB_IACA_USER}:${DB_IACA_PASSWORD}@nexus-db:3306/db_iaca"
      JWT_SECRET: "${JWT_SECRET}"
      M2M_SERVICE_TOKEN: "${M2M_SERVICE_TOKEN}"
      PORT: 3001
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      LOGTO_ENDPOINT: "${LOGTO_ENDPOINT}"
      LOGTO_JWKS_URI: "${LOGTO_JWKS_URI}"
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - neonorte_net

  # ==========================================================
  # KURUPIRA — O Músculo de Engenharia (CPU/Memory-Bound)
  # ==========================================================
  kurupira-backend:
    build:
      context: ./kurupira/backend
      dockerfile: Dockerfile
    container_name: neonorte_kurupira
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://${DB_KURUPIRA_USER}:${DB_KURUPIRA_PASSWORD}@nexus-db:3306/db_kurupira"
      DATABASE_URL_SUMAUMA_RO: "mysql://${DB_ADMIN_USER}:${DB_ADMIN_PASSWORD}@nexus-db:3306/db_sumauma"
      JWT_SECRET: "${JWT_SECRET}"
      M2M_SERVICE_TOKEN: "${M2M_SERVICE_TOKEN}"
      IACA_INTERNAL_URL: "http://iaca-backend:3001"
      PORT: 3002
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=400"
      LOGTO_ENDPOINT: "${LOGTO_ENDPOINT}"
      LOGTO_JWKS_URI: "${LOGTO_JWKS_URI}"
      LOGTO_M2M_RESOURCE: "${LOGTO_M2M_RESOURCE}"
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - neonorte_net

  # ==========================================================
  # NEONORTE ADMIN — Backoffice do Operador (BFF Sumaúma)
  # ==========================================================
  neonorte-admin-backend:
    build:
      context: ./sumauma/backend
      dockerfile: Dockerfile
    container_name: neonorte_admin
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://${DB_SUMAUMA_USER}:${DB_SUMAUMA_PASSWORD}@nexus-db:3306/db_sumauma"
      DATABASE_URL_IACA_RO: "mysql://${DB_ADMIN_USER}:${DB_ADMIN_PASSWORD}@nexus-db:3306/db_iaca"
      DATABASE_URL_KURUPIRA_RO: "mysql://${DB_ADMIN_USER}:${DB_ADMIN_PASSWORD}@nexus-db:3306/db_kurupira"
      JWT_SECRET: "${JWT_SECRET}"
      M2M_SERVICE_TOKEN: "${M2M_SERVICE_TOKEN}"
      IACA_INTERNAL_URL: "http://iaca-backend:3001"
      KURUPIRA_INTERNAL_URL: "http://kurupira-backend:3002"
      ADMIN_FRONTEND_URL: "${ADMIN_FRONTEND_URL}"
      LOGTO_ENDPOINT: "${LOGTO_ENDPOINT}"
      LOGTO_JWKS_URI: "${LOGTO_JWKS_URI}"
      LOGTO_M2M_CLIENT_ID: "${LOGTO_M2M_CLIENT_ID}"
      LOGTO_M2M_CLIENT_SECRET: "${LOGTO_M2M_CLIENT_SECRET}"
      LOGTO_M2M_RESOURCE: "${LOGTO_M2M_RESOURCE}"
      PORT: 3003
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
    depends_on:
      nexus-db:
        condition: service_healthy
      iaca-backend:
        condition: service_healthy
      kurupira-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - neonorte_net

  # ==========================================================
  # NEXUS-DB — Fortaleza de Dados (MySQL 8.0)
  # ==========================================================
  nexus-db:
    image: mysql:8.0
    container_name: neonorte_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    ports:
      - "3306:3306"
    volumes:
      - nexus_mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - neonorte_net

# ==========================================================
# REDE PRIVADA
# ==========================================================
networks:
  neonorte_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  nexus_mysql_data:
