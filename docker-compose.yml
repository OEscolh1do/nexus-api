version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nexus_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: neonorte123
      MYSQL_DATABASE: neonorte
      MYSQL_USER: neonorte
      MYSQL_PASSWORD: neonorte123
    ports:
      - "3307:3306"
    volumes:
      - nexus_mysql_data:/var/lib/mysql

  backend:
    build: ./nexus-api
    container_name: nexus_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: mysql://neonorte:neonorte123@mysql:3306/neonorte
      PORT: 3001
      NODE_ENV: development
    depends_on:
      - mysql
    volumes:
      - ./nexus-api:/app
      - /app/node_modules

  frontend:
    build: ./nexus-erp
    container_name: nexus_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./nexus-erp:/app
      - /app/node_modules

volumes:
  nexus_mysql_data:
