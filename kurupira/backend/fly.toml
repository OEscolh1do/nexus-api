# fly.toml app configuration file generated for neonorte-nexus-api on 2026-04-03T16:40:59-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'neonorte-nexus-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'npx prisma db push --accept-data-loss && node prisma/seed-catalog.js'

[env]
  NODE_ENV = 'production'
  PORT = '3002'
  IS_DEMO = 'true'

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
