#cloud-config
# =============================================================
# Neonorte Ywara — Cloud-Init Bootstrap Script
# Alvo: Debian 13 (Trixie) — Locaweb VPS
# O que faz:
#   1. Cria usuário 'neonorte' com acesso sudo e SSH
#   2. Desabilita login root por SSH
#   3. Configura Firewall (UFW)
#   4. Instala Docker, Docker Compose Plugin e utilitários
#   5. Instala Nginx & Certbot
#   6. Cria estrutura de diretórios do projeto
# =============================================================

# --- Informações do Sistema ---
hostname: neonorte-vps
timezone: America/Belem

# --- Usuário Principal (não root) ---
users:
  - name: neonorte
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    # Cole abaixo a SUA chave pública SSH (cat ~/.ssh/id_rsa.pub no seu PC)
    # Se não tiver, remova o bloco 'ssh_authorized_keys' e acesse com senha.
    # ssh_authorized_keys:
    #   - ssh-rsa AAAAB3Nza... sua-chave-aqui

# --- Packages base ---
packages:
  - curl
  - git
  - wget
  - unzip
  - htop
  - ufw
  - nginx
  - certbot
  - python3-certbot-nginx
  - ca-certificates
  - gnupg
  - lsb-release

package_update: true
package_upgrade: true

# --- Comandos de configuração ---
runcmd:
  # ============================================================
  # SEGURANÇA: Hardening do SSH
  # ============================================================
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
  - systemctl restart sshd

  # ============================================================
  # FIREWALL: Apenas portas essenciais
  # ============================================================
  - ufw --force reset
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # ============================================================
  # DOCKER: Instalação oficial (não via apt do Debian)
  # ============================================================
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker neonorte

  # ============================================================
  # NGINX: Ativar e remover site padrão
  # ============================================================
  - systemctl enable nginx
  - rm -f /etc/nginx/sites-enabled/default
  - systemctl start nginx

  # ============================================================
  # DIRETÓRIOS DO PROJETO
  # ============================================================
  - mkdir -p /srv/ywara
  - chown neonorte:neonorte /srv/ywara

  # ============================================================
  # NODE (via NVM — para build dos frontends no servidor)
  # ============================================================
  - su -l neonorte -c 'curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash'
  - su -l neonorte -c 'source ~/.nvm/nvm.sh && nvm install --lts'

# --- Mensagem de conclusão ---
final_message: |
  =============================================================
  Neonorte VPS Bootstrap CONCLUÍDO!
  Tempo de execução: $UPTIME segundos

  Acesse o servidor com:
    ssh neonorte@<IP_DA_VPS>

  Próximos passos:
    1. Clone o repositório em /srv/ywara
    2. Configure os arquivos .env de produção
    3. Execute: docker compose up -d --build
  =============================================================
