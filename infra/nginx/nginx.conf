# =============================================================
# Neonorte API Gateway — Nginx Reverse Proxy
# Operação Guardiões: Roteamento + Bloqueio de rotas internas
# =============================================================

# --- Rate Limiting Zone (HTTP Context) ---
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

upstream iaca_backend {
    server iaca-backend:3001;
}

upstream kurupira_backend {
    server kurupira-backend:3002;
}

server {
    listen 80;
    server_name localhost;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Rate Limiting Zone ---
    # ==========================================================
    # BLOQUEIO ABSOLUTO: Rotas /internal/* (M2M only)
    # Nenhum tráfego externo pode atingir estas rotas.
    # ==========================================================
    location ~ ^/api/iaca/internal/ {
        deny all;
        return 403;
    }

    location ~ ^/api/kurupira/internal/ {
        deny all;
        return 403;
    }

    # ==========================================================
    # IAÇÃ — Sistema de Gestão (CRM, Finanças, Ops, Strategy)
    # ==========================================================
    location /api/iaca/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://iaca_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ==========================================================
    # KURUPIRA — Bancada de Engenharia (Simulação, GIS, PDFs)
    # Timeouts mais generosos para operações CPU-bound
    # ==========================================================
    location /api/kurupira/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://kurupira_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts generosos para cálculos pesados
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ==========================================================
    # Health Check
    # ==========================================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # Bloquear acesso direto à raiz
    location / {
        return 404;
    }
}
