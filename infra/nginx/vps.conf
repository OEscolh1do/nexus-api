# =============================================================
# Neonorte Nginx Config — Produção (VPS Locaweb)
# Domínio Oficial: neonorte-ywara.tech
# =============================================================

# --- 1. REDIRECIONAMENTO RAIZ (neonorte-ywara.tech -> kurupira) ---
server {
    listen 80;
    server_name neonorte-ywara.tech;
    return 301 https://kurupira.neonorte-ywara.tech$request_uri;
}

# --- 2. KURUPIRA (APP DE ENGENHARIA) ---
server {
    listen 80;
    server_name kurupira.neonorte-ywara.tech;

    # Frontend (Arquivos Estáticos)
    location / {
        root /srv/ywara/kurupira/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Backend Proxy
    location /api {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# --- 3. SUMAÚMA (PAINEL ADMIN) ---
server {
    listen 80;
    server_name admin.neonorte-ywara.tech;

    # Frontend (Arquivos Estáticos)
    location / {
        root /srv/ywara/sumauma/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Backend Proxy (BFF Sumaúma)
    location /admin {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
