# =============================================================
# Neonorte VPS — Docker Compose de Produção
# Alvo: Debian 13 | Locaweb
# Orquestra: Banco MySQL, Kurupira API e Sumaúma API
# =============================================================

services:
  # --- Banco de Dados MySQL 8.0 ---
  nexus-db:
    image: mysql:8.0
    container_name: neonorte_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
      - nexus_mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - neonorte_net

  # --- Kurupira Backend (Engine de Engenharia) ---
  kurupira-backend:
    build:
      context: ./kurupira/backend
      dockerfile: Dockerfile
    container_name: neonorte_kurupira
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      DATABASE_URL: "mysql://$${DB_KURUPIRA_USER}:$${DB_KURUPIRA_PASSWORD}@nexus-db:3306/db_kurupira"
      DATABASE_URL_SUMAUMA_RO: "mysql://$${DB_ADMIN_USER}:$${DB_ADMIN_PASSWORD}@nexus-db:3306/db_sumauma"
      JWT_SECRET: "${JWT_SECRET}"
      M2M_SERVICE_TOKEN: "${M2M_SERVICE_TOKEN}"
      PORT: 3002
      NODE_ENV: production
      LOGTO_ENDPOINT: "${LOGTO_ENDPOINT}"
      LOGTO_JWKS_URI: "${LOGTO_JWKS_URI}"
      LOGTO_M2M_RESOURCE: "${LOGTO_M2M_RESOURCE}"
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - neonorte_net

  # --- Sumaúma Backend (Admin BFF) ---
  sumauma-backend:
    build:
      context: ./sumauma/backend
      dockerfile: Dockerfile
    container_name: neonorte_admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      DATABASE_URL: "mysql://$${DB_SUMAUMA_USER}:$${DB_SUMAUMA_PASSWORD}@nexus-db:3306/db_sumauma"
      DATABASE_URL_KURUPIRA_RO: "mysql://$${DB_ADMIN_USER}:$${DB_ADMIN_PASSWORD}@nexus-db:3306/db_kurupira"
      JWT_SECRET: "${JWT_SECRET}"
      M2M_SERVICE_TOKEN: "${M2M_SERVICE_TOKEN}"
      ADMIN_FRONTEND_URL: "https://admin.vps66668.publiccloud.com.br"
      LOGTO_ENDPOINT: "${LOGTO_ENDPOINT}"
      LOGTO_JWKS_URI: "${LOGTO_JWKS_URI}"
      LOGTO_M2M_CLIENT_ID: "${LOGTO_M2M_CLIENT_ID}"
      LOGTO_M2M_CLIENT_SECRET: "${LOGTO_M2M_CLIENT_SECRET}"
      LOGTO_M2M_RESOURCE: "${LOGTO_M2M_RESOURCE}"
      PORT: 3003
      NODE_ENV: production
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - neonorte_net

networks:
  neonorte_net:
    driver: bridge

volumes:
  nexus_mysql_data:
