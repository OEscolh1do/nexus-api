<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolarFlow | NeoNorte Engenharia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neonorte: {
              // Legacy keys mapped to New Strict Palette
              purple: '#64147D',      // Primary (Roxo)
              green: '#05CD46',       // Primary (Verde)
              lightPurple: '#874BBE', // Secondary (Roxo Claro)
              darkPurple: '#3C0A41',  // Secondary (Roxo Escuro)
              deepPurple: '#1E002D',  // Secondary (Roxo Profundo)
              lightGreen: '#73EB82',  // Secondary (Verde Claro)
              darkGreen: '#146437',   // Secondary (Verde Escuro)

              // Semantic aliases (optional)
              primary: '#64147D',
              secondary: '#05CD46',
              surface: '#F8FAFC',
            }
          },
          fontFamily: {
            sans: ['Grammatika', 'Inter', 'sans-serif'],
            display: ['Grammatika', 'Inter', 'sans-serif'],
            mono: ['Consolas', 'monaco', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
      color: #3C0A41;
      -webkit-font-smoothing: antialiased;
    }

    .neonorte-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='%2364147D' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    .neonorte-overlay {
      position: relative;
      overflow: hidden;
    }

    .neonorte-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background-color: #64147D;
      opacity: 0.7;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 1;
    }

    .neonorte-gradient {
      background: linear-gradient(135deg, #64147D 0%, #1E002D 100%) !important;
    }

    @media print {
      @page {
        size: A4;
        margin: 0mm !important;
      }

      body {
        background: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hide everything by default */
      body>* {
        display: none !important;
      }

      /* Only show the root and the print container */
      #root {
        display: block !important;
      }

      #root>* {
        display: none !important;
      }

      /* The container with .print-container class and its children should be visible */
      #root>.print-container {
        display: block !important;
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: none !important;
      }

      #root>.print-container * {
        display: block;
      }

      /* Utility to hide specific elements */
      .no-print {
        display: none !important;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #F1F5F9;
    }

    ::-webkit-scrollbar-thumb {
      background: #64147D;
      border-radius: 10px;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="neonorte-pattern">
  <div id="root"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
